name: Tag release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from distribution.yaml
        id: version
        run: |
          version=$(awk '/^version:/ {print $2; exit}' distribution.yaml | tr -d '"'"'"'')
          if [ -z "$version" ]; then
            echo "::error file=distribution.yaml::could not read version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: exists
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch --tags --quiet
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "tag $TAG already exists — nothing to do"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.exists.outputs.skip == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "tagged $TAG at $GITHUB_SHA"
